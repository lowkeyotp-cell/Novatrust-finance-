<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .container {
    padding: 20px;
  }

  .welcome {
    font-size: 22px;
    font-weight: bold;
    margin-top: 10px;
  }

  .sub {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
  }

  /* 💰 BALANCE CARD */
  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .label {
    font-size: 13px;
    opacity: 0.85;
    letter-spacing: 1px;
  }

  .balance {
    font-size: 48px;
    font-weight: 900;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  .currency {
    font-size: 18px;
    opacity: 0.9;
  }

  /* quick actions */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light {
    background: white;
    color: #0b1220;
  }

  .dark {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* transactions */
  .section {
    margin-top: 25px;
  }

  .txn {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14px;
  }

  .credit { color: #4ade80; }
  .debit { color: #f87171; }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <div class="welcome">Welcome back 👋</div>
  <div class="sub">Your wealth overview is ready</div>

  <!-- 💰 BALANCE -->
  <div class="card">
    <div class="label">TOTAL BALANCE</div>

    <div class="balance">
      <span class="currency">$</span>700,000
    </div>

    <div class="grid">
      <button class="btn light">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark">History</button>
    </div>
  </div>

  <!-- transactions -->
  <div class="section">
    <h3>Recent Activity</h3>

    <div class="txn">
      <span>Apple Store</span>
      <span class="debit">- $1,200</span>
    </div>

    <div class="txn">
      <span>Salary Deposit</span>
      <span class="credit">+ $25,000</span>
    </div>

    <div class="txn">
      <span>Investment Return</span>
      <span class="credit">+ $18,500</span>
    </div>

  </div>

</div>

</body>
</html>
