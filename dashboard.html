<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
  }

  .balance {
    font-size: 50px;
    font-weight: 900;
  }

  .accounts {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.7;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light { background: white; color: #0b1220; }
  .dark { background: rgba(255,255,255,0.1); color: white; }

  /* SUPPORT */
  .support {
    margin-top: 25px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
  }

  .qbtn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    text-align: left;
  }

  .chat {
    margin-top: 10px;
    padding: 12px;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    min-height: 60px;
  }

  /* HISTORY */
  .history {
    display: none;
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    max-height: 400px;
    overflow-y: auto;
  }

  .txn {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .credit { color: #4ade80; }
  .debit { color: #f87171; }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <!-- BALANCE -->
  <div class="card">

    <div class="balance">$700,000</div>

    <div class="accounts">
      Checking: <b>$10,000</b><br>
      Savings: <b>$300,000</b><br>
      Current: <b>$390,000</b>
    </div>

    <div class="grid">
      <button class="btn light">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark" onclick="toggleHistory()">History</button>
    </div>

  </div>

  <!-- SUPPORT AI -->
  <div class="support">
    <h3>Customer Support AI</h3>

    <div id="chat" class="chat">Select a question</div>

    <button class="qbtn" onclick="reply()">How do I withdraw money?</button>
    <button class="qbtn" onclick="reply()">How do I transfer funds?</button>
    <button class="qbtn" onclick="reply()">Why is my account restricted?</button>
  </div>

  <!-- HISTORY -->
  <div id="history" class="history">
    <h3>Transaction History (Last 12 Months)</h3>
    <div id="txns"></div>
  </div>

</div>

<script>

function reply() {
  document.getElementById("chat").innerText =
  "Please contact the account owner or assigned officer for approval and assistance.";
}

/* TOGGLE HISTORY */
function toggleHistory() {
  let box = document.getElementById("history");

  if (box.style.display === "block") {
    box.style.display = "none";
  } else {
    box.style.display = "block";
  }
}

/* GENERATE 70 REALISTIC TRANSACTIONS */
const txns = document.getElementById("txns");

let types = ["Salary Deposit","Apple Store","Transfer","Investment Return","Netflix","Uber","Amazon","Bank Fee","Crypto Buy","Utility Bill"];

for (let i = 1; i <= 70; i++) {

  let type = types[Math.floor(Math.random() * types.length)];
  let amount = Math.floor(Math.random() * 5000) + 50;
  let isCredit = Math.random() > 0.6;

  let date = new Date();
  date.setDate(date.getDate() - i * 5);

  let time = date.toLocaleDateString() + " " + date.toLocaleTimeString();

  txns.innerHTML += `
    <div class="txn">
      <span>${time} - ${type}</span>
      <span class="${isCredit ? 'credit' : 'debit'}">
        ${isCredit ? '+' : '-'}$${amount}
      </span>
    </div>
  `;
}

</script>

</body>
</html>
