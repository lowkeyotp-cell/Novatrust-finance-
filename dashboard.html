<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .welcome {
    font-size: 22px;
    font-weight: bold;
  }

  .sub {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
  }

  /* 💰 MAIN CARD */
  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
  }

  .card:hover {
    transform: translateY(-3px);
  }

  .label {
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0.8;
  }

  .balance {
    font-size: 50px;
    font-weight: 900;
    margin-top: 10px;
  }

  /* buttons */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    transform: scale(1.05);
  }

  .light {
    background: white;
    color: #0b1220;
  }

  .dark {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* 📊 WEALTH BREAKDOWN */
  .breakdown {
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
  }

  .bar {
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin-top: 8px;
    overflow: hidden;
  }

  .fill1 {
    width: 60%;
    height: 100%;
    background: #4ade80;
  }

  .fill2 {
    width: 25%;
    height: 100%;
    background: #60a5fa;
  }

  .fill3 {
    width: 15%;
    height: 100%;
    background: #fbbf24;
  }

  .section {
    margin-top: 25px;
  }

  .txn {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    font-size: 14px;
  }

  .credit { color: #4ade80; }
  .debit { color: #f87171; }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <div class="welcome">Welcome back 👋</div>
  <div class="sub">Your financial overview is ready</div>

  <!-- 💰 BALANCE -->
  <div class="card">
    <div class="label">TOTAL BALANCE</div>
    <div class="balance">$700,000</div>

    <div class="grid">
      <button class="btn light">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark">History</button>
    </div>
  </div>

  <!-- 📊 BREAKDOWN -->
  <div class="breakdown">
    <h4>Wealth Breakdown</h4>

    <p>Savings</p>
    <div class="bar"><div class="fill1"></div></div>

    <p style="margin-top:10px;">Investments</p>
    <div class="bar"><div class="fill2"></div></div>

    <p style="margin-top:10px;">Cash</p>
    <div class="bar"><div class="fill3"></div></div>
  </div>

  <!-- transactions -->
  <div class="section">
    <h3>Recent Activity</h3>

    <div class="txn">
      <span>Apple Store</span>
      <span class="debit">- $1,200</span>
    </div>

    <div class="txn">
      <span>Salary</span>
      <span class="credit">+ $25,000</span>
    </div>

    <div class="txn">
      <span>Investment Return</span>
      <span class="credit">+ $18,500</span>
    </div>

  </div>

</div>

</body>
</html>
