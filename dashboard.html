<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Private Banking</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
  }

  .balance {
    font-size: 48px;
    font-weight: 900;
  }

  .accounts {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.7;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light { background: white; color: #0b1220; }
  .dark { background: rgba(255,255,255,0.1); color: white; }

  /* SUPPORT */
  .support {
    margin-top: 25px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
  }

  .chat {
    margin-top: 10px;
    padding: 12px;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    min-height: 60px;
  }

  .qbtn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    text-align: left;
  }

  /* HISTORY */
  .history {
    display: none;
    margin-top: 20px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
    max-height: 400px;
    overflow-y: auto;
  }

  .txn {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .credit { color: #4ade80; }
  .debit { color: #f87171; }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
  }

  .box {
    background: #111a2e;
    padding: 22px;
    border-radius: 14px;
    width: 320px;
  }

  .box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
  }

  .sendbtn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: #4ade80;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <!-- BALANCE -->
  <div class="card">

    <div class="balance" id="balance">$700,000</div>

    <div class="accounts">
      Checking: <b>$10,000</b><br>
      Savings: <b>$300,000</b><br>
      Current: <b>$390,000</b>
    </div>

    <div class="grid">
      <button class="btn light" onclick="openSend()">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark" onclick="toggleHistory()">History</button>
    </div>

  </div>

  <!-- AI SUPPORT -->
  <div class="support">

    <h3>Customer Support AI</h3>

    <div id="chat" class="chat">Select a question below</div>

    <button class="qbtn" onclick="ask('withdraw')">How do I withdraw money?</button>
    <button class="qbtn" onclick="ask('transfer')">How do I transfer funds?</button>
    <button class="qbtn" onclick="ask('restricted')">Why is my account restricted?</button>
    <button class="qbtn" onclick="ask('time')">How long does transfer take?</button>

  </div>

  <!-- HISTORY -->
  <div id="history" class="history">
    <h3>Transaction History (Last 12 Months)</h3>
    <div id="txns"></div>
  </div>

</div>

<!-- SEND MODAL -->
<div id="sendModal" class="modal">
  <div class="box">
    <h3>Secure Transfer Request</h3>

    <input placeholder="Recipient Name">
    <input placeholder="Bank Name">
    <input placeholder="Account Number">
    <input id="amount" placeholder="Amount ($)">

    <button class="sendbtn" onclick="sendMoney()">Submit Request</button>
  </div>
</div>

<script>

let balance = 700000;

/* AI SUPPORT */
function ask(type) {

  let chat = document.getElementById("chat");

  let responses = {
    withdraw: "Withdrawals require approval from the account owner.",
    transfer: "Transfers are processed under compliance verification.",
    restricted: "Your account may require verification. Contact support officer.",
    time: "Transfers typically take 1–3 business days depending on approval."
  };

  chat.innerText = responses[type];
}

/* SEND (NO DEDUCTION) */
function sendMoney() {

  let amt = document.getElementById("amount").value;

  if (!amt || amt <= 0) {
    alert("Enter valid amount");
    return;
  }

  document.getElementById("sendModal").style.display = "none";

  document.getElementById("chat").innerText =
    "Transfer request submitted. Please contact account owner for approval.";

  addTransaction(amt);
}

/* HISTORY SYSTEM */
let txns = document.getElementById("txns");
let all = [];
let loaded = 0;

function generate() {

  let types = ["Salary","Apple Store","Amazon","Transfer","Investment","Netflix","Uber","Fee","Crypto"];

  for (let i = 1; i <= 70; i++) {

    let type = types[Math.floor(Math.random() * types.length)];
    let amount = Math.floor(Math.random() * 5000) + 100;
    let credit = Math.random() > 0.5;

    let date = new Date();
    date.setDate(date.getDate() - i * 3);

    all.push({
      time: date.toLocaleString(),
      type,
      amount,
      credit
    });
  }
}

function loadMore() {

  for (let i = loaded; i < loaded + 10 && i < all.length; i++) {

    txns.innerHTML += `
      <div class="txn">
        <span>${all[i].time} - ${all[i].type}</span>
        <span class="${all[i].credit ? 'credit' : 'debit'}">
          ${all[i].credit ? '+' : '-'}$${all[i].amount}
        </span>
      </div>
    `;
  }

  loaded += 10;
}

function toggleHistory() {
  let h = document.getElementById("history");
  h.style.display = h.style.display === "block" ? "none" : "block";
  if (loaded === 0) loadMore();
}

document.getElementById("history").addEventListener("scroll", function () {
  if (this.scrollTop + this.clientHeight >= this.scrollHeight - 5) {
    loadMore();
  }
});

/* ADD NEW TRANSACTION */
function addTransaction(amount) {
  all.unshift({
    time: new Date().toLocaleString(),
    type: "TRANSFER PENDING (APPROVAL REQUIRED)",
    amount: amount,
    credit: false
  });
}

generate();

</script>

</body>
</html>
