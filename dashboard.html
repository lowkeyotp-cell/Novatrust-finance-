<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
  }

  .balance {
    font-size: 50px;
    font-weight: 900;
  }

  .accounts {
    margin-top: 10px;
    font-size: 14px;
    line-height: 1.7;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light {
    background: white;
    color: #0b1220;
  }

  .dark {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* MODAL */
  .modal {
    display: none;
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0; left: 0;
    background: rgba(0,0,0,0.75);
    justify-content: center;
    align-items: center;
  }

  .box {
    background: #111a2e;
    padding: 20px;
    border-radius: 14px;
    width: 320px;
  }

  .box h3 {
    margin-bottom: 10px;
  }

  .box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  .sendbtn {
    margin-top: 12px;
    width: 100%;
    padding: 12px;
    background: #4ade80;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }

  /* LOADING SCREEN */
  .loading {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #0b1220;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 5px solid white;
    border-top: 5px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  .success {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: #0b1220;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: #4ade80;
    font-weight: bold;
  }

  .check {
    font-size: 60px;
    margin-bottom: 10px;
  }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <div class="card">
    <div class="balance">$700,000</div>

    <div class="accounts">
      Checking: <b>$10,000</b><br>
      Savings: <b>$300,000</b><br>
      Current: <b>$390,000</b>
    </div>

    <div class="grid">
      <button class="btn light" onclick="openSend()">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark">History</button>
    </div>
  </div>

</div>

<!-- SEND MODAL -->
<div id="modal" class="modal">
  <div class="box">
    <h3>New Transfer</h3>

    <input placeholder="Recipient Full Name">
    <input placeholder="Account Number">
    <input placeholder="Bank Name">
    <input placeholder="Amount ($)">

    <button class="sendbtn" onclick="processTransfer()">
      Confirm Transfer
    </button>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="loading">
  <div class="spinner"></div>
  <p style="margin-top:15px;">Processing secure transfer...</p>
</div>

<!-- SUCCESS -->
<div id="success" class="success">
  <div class="check">✔</div>
  <h2>Transfer Pending Approval</h2>
  <p>Please contact account owner for approval</p>
</div>

<script>

function openSend() {
  document.getElementById("modal").style.display = "flex";
}

function processTransfer() {

  document.getElementById("modal").style.display = "none";
  document.getElementById("loading").style.display = "flex";

  // 5 seconds loading like real bank system
  setTimeout(() => {

    document.getElementById("loading").style.display = "none";
    document.getElementById("success").style.display = "flex";

    // auto hide after few seconds (optional)
    setTimeout(() => {
      document.getElementById("success").style.display = "none";
    }, 4000);

  }, 5000);
}

</script>

</body>
</html>
