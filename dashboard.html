<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .welcome {
    font-size: 22px;
    font-weight: bold;
  }

  .sub {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
  }

  /* CARD */
  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
  }

  .balance {
    font-size: 50px;
    font-weight: 900;
    margin-top: 10px;
  }

  .accounts {
    margin-top: 15px;
    font-size: 14px;
    line-height: 1.8;
  }

  /* BUTTONS */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light {
    background: white;
    color: #0b1220;
  }

  .dark {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* SUPPORT */
  .support {
    margin-top: 25px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
  }

  .chat-box {
    margin-top: 10px;
    padding: 12px;
    background: rgba(0,0,0,0.25);
    border-radius: 10px;
    min-height: 70px;
    font-size: 14px;
  }

  .qbtn {
    margin-top: 8px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    text-align: left;
  }

  /* SEND MODAL */
  .modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
  }

  .box {
    background: #111a2e;
    padding: 20px;
    border-radius: 12px;
    width: 300px;
  }

  .box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
  }

  .sendbtn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    background: #4ade80;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <div class="welcome">Welcome back 👋</div>
  <div class="sub">Your financial overview is ready</div>

  <!-- BALANCE -->
  <div class="card">

    <div class="balance">$700,000</div>

    <div class="accounts">
      Checking: <b>$10,000</b><br>
      Savings: <b>$300,000</b><br>
      Current: <b>$390,000</b>
    </div>

    <div class="grid">
      <button class="btn light" onclick="openSend()">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark">History</button>
    </div>

  </div>

  <!-- AI SUPPORT -->
  <div class="support">

    <h3>Customer Support AI</h3>

    <div id="chat" class="chat-box">
      Select a question below
    </div>

    <button class="qbtn" onclick="reply('withdraw')">
      How do I withdraw money?
    </button>

    <button class="qbtn" onclick="reply('transfer')">
      How do I transfer funds?
    </button>

    <button class="qbtn" onclick="reply('account')">
      Why is my account restricted?
    </button>

  </div>

</div>

<!-- SEND MODAL -->
<div id="modal" class="modal">
  <div class="box">
    <h3>Send Money</h3>
    <input placeholder="Recipient Name">
    <input placeholder="Amount">
    <button class="sendbtn" onclick="send()">Confirm Transfer</button>
  </div>
</div>

<script>

function reply(type) {
  document.getElementById("chat").innerText =
    "Please contact the account owner or assigned officer for assistance regarding this request.";
}

function openSend() {
  document.getElementById("modal").style.display = "flex";
}

function send() {
  alert("Transfer request submitted. Please contact account owner for approval.");
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
