<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Dashboard</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    background: #0b1220;
    color: white;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .topbar {
    padding: 18px;
    background: rgba(255,255,255,0.05);
    display: flex;
    justify-content: space-between;
    font-weight: bold;
  }

  .container {
    padding: 20px;
  }

  .welcome {
    font-size: 22px;
    font-weight: bold;
  }

  .sub {
    font-size: 13px;
    opacity: 0.7;
    margin-top: 5px;
  }

  /* 💰 CARD */
  .card {
    margin-top: 20px;
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    padding: 25px;
    border-radius: 18px;
  }

  .balance {
    font-size: 50px;
    font-weight: 900;
    margin-top: 10px;
  }

  .accounts {
    margin-top: 15px;
    font-size: 14px;
    line-height: 1.8;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 15px;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
  }

  .light {
    background: white;
    color: #0b1220;
  }

  .dark {
    background: rgba(255,255,255,0.1);
    color: white;
  }

  /* 🆘 SUPPORT SECTION */
  .support {
    margin-top: 25px;
    background: rgba(255,255,255,0.05);
    padding: 15px;
    border-radius: 15px;
  }

  .chat-box {
    margin-top: 10px;
    padding: 10px;
    background: rgba(0,0,0,0.2);
    border-radius: 10px;
    min-height: 80px;
    font-size: 14px;
  }

  .questions {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .qbtn {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    text-align: left;
    transition: 0.2s;
  }

  .qbtn:hover {
    background: rgba(255,255,255,0.2);
  }
</style>
</head>

<body>

<div class="topbar">
  <div>Novatrust Private Banking</div>
  <div>Secure</div>
</div>

<div class="container">

  <div class="welcome">Welcome back 👋</div>
  <div class="sub">Your financial overview is ready</div>

  <!-- 💰 BALANCE -->
  <div class="card">

    <div class="balance">$700,000</div>

    <div class="accounts">
      🏦 Checking: <b>$10,000</b><br>
      💰 Savings: <b>$300,000</b><br>
      📈 Current: <b>$390,000</b>
    </div>

    <div class="grid">
      <button class="btn light">Send</button>
      <button class="btn light">Receive</button>
      <button class="btn dark">Invest</button>
      <button class="btn dark">History</button>
    </div>

  </div>

  <!-- 🆘 CUSTOMER SUPPORT AI -->
  <div class="support">

    <h3>Customer Support Assistant</h3>

    <div id="chat" class="chat-box">
      Select a question below to get help.
    </div>

    <div class="questions">

      <button class="qbtn" onclick="reply('withdraw')">
        How do I withdraw money?
      </button>

      <button class="qbtn" onclick="reply('account')">
        Why is my account restricted?
      </button>

      <button class="qbtn" onclick="reply('transfer')">
        How do I transfer funds?
      </button>

      <button class="qbtn" onclick="reply('support')">
        I need human support
      </button>

    </div>

  </div>

</div>

<script>
function reply(type) {
  let chat = document.getElementById("chat");

  if (type === "withdraw") {
    chat.innerHTML = "Please contact the officer in charge of this account to process withdrawals securely.";
  }

  if (type === "account") {
    chat.innerHTML = "Your account status is monitored for security. Contact support for verification.";
  }

  if (type === "transfer") {
    chat.innerHTML = "Transfers are processed under account authorization. Please reach support for assistance.";
  }

  if (type === "support") {
    chat.innerHTML = "A customer support agent will be assigned shortly. Please wait...";
  }
}
</script>

</body>
</html>
