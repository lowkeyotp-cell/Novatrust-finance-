<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Login</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1e3a8a, #0b1220 70%);
    color: white;
  }

  .container {
    width: 90%;
    max-width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
  }

  .logo {
    width: 70px;
    height: 70px;
    margin: auto;
    margin-bottom: 20px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border: none;
    border-radius: 8px;
    outline: none;
  }

  .btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: white;
    color: #0b1220;
    font-weight: bold;
    cursor: pointer;
  }

  .btn:hover {
    background: #e5e7eb;
  }

  /* spinner animation */
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* success pop animation */
  @keyframes pop {
    0% { transform: scale(0.2); opacity:0; }
    100% { transform: scale(1); opacity:1; }
  }
</style>
</head>

<body>

<div class="container">

  <div class="logo">NT</div>

  <h2>Secure Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button class="btn" onclick="login()">Login</button>

</div>

<script>
function login() {

  const correctUser = "baemax12";
  const correctPass = "Emilybaemax1234";

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === correctUser && pass === correctPass) {

    // 🔄 LOADING SCREEN
    document.body.innerHTML = `
      <div style="
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        flex-direction:column;
        background:#0b1220;
        color:white;
        font-family:Arial;
      ">
        <div style="
          width:50px;
          height:50px;
          border:5px solid #fff;
          border-top:5px solid transparent;
          border-radius:50%;
          animation:spin 1s linear infinite;
        "></div>

        <p style="margin-top:15px;">Verifying credentials...</p>
      </div>

      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    `;

    // ⏳ SUCCESS SCREEN AFTER DELAY
    setTimeout(() => {

      document.body.innerHTML = `
        <div style="
          height:100vh;
          display:flex;
          justify-content:center;
          align-items:center;
          flex-direction:column;
          background:#0b1220;
          color:#4ade80;
          font-family:Arial;
        ">
          <div style="
            font-size:70px;
            animation:pop 0.4s ease;
          ">✔</div>

          <h1>Login Successful</h1>
          <p>Redirecting to dashboard...</p>
        </div>

        <style>
          @keyframes pop {
            0% { transform: scale(0.2); opacity:0; }
            100% { transform: scale(1); opacity:1; }
          }
        </style>
      `;

      sessionStorage.setItem("loggedIn", "true");

      setTimeout(() => {
        window.location.href = "./dashboard.html";
      }, 2000);

    }, 2500);

  } else {
    alert("Invalid login credentials");
  }
}
</script>

</body>
</html>
