<!DOCTYPE html>
<html>
<head>
  <title>Novatrust Private Banking</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .btn:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Novatrust Bank</h1>
    <p>Secure Digital Banking Platform</p>
    <button class="btn">Enter Dashboard</button>
  </div>
</body>
</html>
