<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novatrust Private Banking</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b1f3a;
      color: white;
    }

    .card {
      text-align: center;
      padding: 40px 25px;
      max-width: 400px;
      width: 90%;
    }

    .logo {
      width: 70px;
      height: 70px;
      background: white;
      color: #0b1f3a;
      border-radius: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
      margin: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #0b1f3a;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.02);
      background: #e5e7eb;
    }

    .footer {
      margin-top: 20px;
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="logo">NT</div>

    <h1>Novatrust Banking</h1>

    <p>Secure digital banking platform built for modern finance</p>

    <button class="btn">Continue</button>

    <div class="footer">
      Protected by advanced security systems
    </div>

  </div>

</body>
</html>
