<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novatrust Private Banking</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #1e3a8a, #0b1220 70%);
      color: white;
      overflow: hidden;
    }

    /* subtle floating glow */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(59, 130, 246, 0.3);
      filter: blur(100px);
      top: -50px;
      left: -50px;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 40px 25px;
      z-index: 1;
    }

    .logo {
      width: 72px;
      height: 72px;
      margin: auto;
      margin-bottom: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 14px;
      opacity: 0.75;
      line-height: 1.5;
      margin-bottom: 30px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #ffffff;
      color: #0b1220;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #e5e7eb;
    }

    .footer {
      margin-top: 18px;
      font-size: 11px;
      opacity: 0.5;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">

    <div class="logo">NT</div>

    <h1>Secure Banking Experience</h1>

    <p>
      Access your Novatrust Private Banking account with
      enterprise-grade security and modern financial tools.
    </p>

    <button class="btn">Sign in to continue</button>

    <div class="footer">
      © Novatrust Financial Services
    </div>

  </div>

</body>
</html>
