<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novatrust Private Banking</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
  }

  body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #1e3a8a, #0b1220 70%);
    color: white;
    overflow: hidden;
  }

  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(59,130,246,0.25);
    filter: blur(120px);
    top: -50px;
    left: -50px;
  }

  .container {
    text-align: center;
    max-width: 420px;
    padding: 40px 25px;
    z-index: 2;
  }

  .logo {
    width: 85px;
    height: 85px;
    margin: auto;
    margin-bottom: 20px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 20px;
    letter-spacing: 2px;
    animation: pulse 2.5s infinite;
    backdrop-filter: blur(10px);
  }

  @keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.08);}
    100% {transform: scale(1);}
  }

  h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  p {
    font-size: 14px;
    opacity: 0.75;
    line-height: 1.5;
    margin-bottom: 30px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #0b1220;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
  }

  .btn:hover {
    transform: scale(1.03);
    background: #e5e7eb;
  }

  .footer {
    margin-top: 18px;
    font-size: 11px;
    opacity: 0.5;
  }
</style>

</head>

<body>

<div class="glow"></div>

<div class="container">

  <div class="logo">NT</div>

  <h1>Novatrust Private Banking</h1>

  <p>
    Secure digital banking platform designed for modern financial access,
    portfolio management, and intelligent wealth tools.
  </p>

  <button class="btn" onclick="window.location.href='./login.html'">
    Sign in to continue
  </button>

  <div class="footer">
    © Novatrust Financial Services
  </div>

</div>

</body>
</html>
